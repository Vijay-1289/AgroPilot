<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52B788" />
      <stop offset="100%" stop-color="#2D6A4F" />
    </linearGradient>
    <linearGradient id="brownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9C7A55" />
      <stop offset="100%" stop-color="#7C5C3A" />
    </linearGradient>
  </defs>
  <!-- Background Shield -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="#F0ECE3" opacity="0.4" />
  
  <!-- Outer Compass Ring -->
  <circle cx="50" cy="50" r="32" stroke="url(#brownGrad)" stroke-width="2.5" stroke-dasharray="4 6" fill="none" opacity="0.8" />
  
  <!-- Outer Leaf Shape (Pilot Wing) -->
  <path d="M 50 18 C 65 32, 70 50, 70 64 C 70 78, 58 82, 50 82 C 42 82, 30 78, 30 64 C 30 50, 35 32, 50 18 Z" fill="url(#leafGrad)" />
  
  <!-- Inner Dynamic Compass Arrow / Leaf Vein -->
  <path d="M 50 24 L 50 78" stroke="#F8F4EC" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Star / Navigation Cross At Top -->
  <polygon points="50,28 52,34 58,34 53,38 55,44 50,40 45,44 47,38 42,34 48,34" fill="#F8F4EC" />
</svg>
